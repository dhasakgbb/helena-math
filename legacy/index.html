<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Astrid's Number Garden</title>
  <meta name="description" content="A small math practice app — times tables, speed addition, and number sorting. Astrid tailors the modes to how your kid learns." />
  <meta name="theme-color" content="#1c1a3a" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E➕%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css?v=2" />
  <!-- Canonical Astrid profile schema, exposes window.HelenaProfile (capital H — historic identifier kept pinned by the shared package).
       The lowercase window.helenaProfile is this app's own store, set by profile.js. -->
  <script src="https://cdn.jsdelivr.net/gh/dhasakgbb/profile-schema@v1.0.0/dist/index.iife.js" integrity="sha384-LivUdiZj5QioDemh+2iJHjmd1mmFO7JoRqksnRK3aupWKxvpZAlBcV7xhqhCj/uD" crossorigin="anonymous"></script>
  <!-- If jsDelivr is down or SRI fails, load the same pinned bytes from rawcdn.githack.com. -->
  <script>window.HelenaProfile||document['wri'+'te']('<script src="https://rawcdn.githack.com/dhasakgbb/profile-schema/v1.0.0/dist/index.iife.js" integrity="sha384-LivUdiZj5QioDemh+2iJHjmd1mmFO7JoRqksnRK3aupWKxvpZAlBcV7xhqhCj/uD" crossorigin="anonymous"><\/script>');</script>
  <!-- Profile loaded before app so window.helenaProfile is ready -->
  <script src="profile.js?v=3"></script>
  <!-- Astrid mascot — exposes window.AstridMascot. Load before app.js so init can mount poses. -->
  <script src="https://cdn.jsdelivr.net/gh/dhasakgbb/astrid-mascot@v1.0.0/dist/index.iife.js" crossorigin="anonymous"></script>
  <script src="app.js?v=3" defer></script>
</head>
<body>
  <header class="app-header">
    <h1>Number Garden</h1>
    <p class="tagline">Three modes. Pick what fits your brain today.</p>
  </header>

  <main id="appRoot">
    <!-- Profile banner injected here by app.js -->
    <div id="profileBanner" class="profile-banner" hidden></div>

    <!-- Mode selection -->
    <section id="modeSelectionView" class="mode-select">
      <a class="hub-back-link" href="https://helena-learner-profile.vercel.app/hub" rel="noopener">
        <span aria-hidden="true">←</span> Astrid Hub
      </a>
      <!-- Astrid mascot mount — populated by app.js via window.AstridMascot.renderInto -->
      <div id="astridHomeMount" aria-hidden="true" style="display:flex;justify-content:center;width:120px;height:120px;margin:0 auto 0.5rem;"></div>
      <div class="mode-grid" role="group" aria-label="Choose a mode">
        <button class="mode-card mode-card-tt" data-mode="times-tables" type="button">
          <div class="mode-glyph" aria-hidden="true">×</div>
          <div class="mode-title">Times Tables</div>
          <div class="mode-desc">Multiplication facts. Type your answer.</div>
        </button>
        <button class="mode-card mode-card-sa" data-mode="speed-add" type="button">
          <div class="mode-glyph" aria-hidden="true">+</div>
          <div class="mode-title">Speed Add</div>
          <div class="mode-desc">Hear the problem read out loud. Type fast.</div>
        </button>
        <button class="mode-card mode-card-ns" data-mode="number-sort" type="button">
          <div class="mode-glyph" aria-hidden="true">⇅</div>
          <div class="mode-title">Number Sort</div>
          <div class="mode-desc">Drag numbers into the right bin: even, odd, or prime.</div>
        </button>
      </div>
    </section>

    <!-- Active gameplay area -->
    <section id="gameView" class="game-view" hidden>
      <button id="backToHubBtn" class="back-link" type="button">← Back to modes</button>
      <div class="game-header">
        <h2 id="gameTitle">Game</h2>
        <div class="game-stats">
          <span>Q <span id="qIndex">1</span>/<span id="qTotal">10</span></span>
          <span>· Score <span id="qScore">0</span></span>
        </div>
      </div>

      <!-- Mode-specific gameplay container -->
      <div id="gameBody" class="game-body"></div>
      <div id="gameFeedback" class="game-feedback" aria-live="polite"></div>
    </section>

    <!-- End of round -->
    <section id="endView" class="end-view" hidden>
      <h2 id="endTitle">Nice work.</h2>
      <p id="endSummary"></p>
      <div class="end-actions">
        <button id="endPlayAgainBtn" class="btn-primary" type="button">Play again</button>
        <button id="endBackBtn" class="btn-ghost" type="button">Pick a different mode</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <span>Part of the Astrid learning platform.</span>
    <a href="https://helena-learner-profile.vercel.app/hub" target="_blank" rel="noopener">All games →</a>
  </footer>
</body>
</html>
